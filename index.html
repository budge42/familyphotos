<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Photos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Work+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="top">
        <div>
          <h1>Budge Family Photos</h1>
          <p class="subtitle">Our place to share and keep memories safe.</p>
        </div>
        <div class="actions">
          <label class="upload-btn" for="fileInput">Upload photos</label>
          <input id="fileInput" type="file" accept="image/*" multiple />
        </div>
      </header>

      <main>
        <section id="gallery" class="gallery" aria-live="polite"></section>
        <section id="emptyState" class="empty-state" hidden>
          <h2>No photos yet</h2>
          <p>
            Add files to <code>photos/</code> and list them in
            <code>photos/photos.js</code>, or use Upload photos for a quick
            preview.
          </p>
        </section>
      </main>
    </div>

    <template id="photoCardTemplate">
      <button class="card" type="button">
        <img loading="lazy" />
      </button>
    </template>

    <section id="birthdayOverlay" class="birthday-overlay" aria-live="polite" hidden>
      <canvas id="confettiCanvas" class="confetti-canvas"></canvas>
      <div class="birthday-card" role="dialog" aria-modal="true" aria-label="Happy Birthday">
        <h2>Happy Birthday</h2>
        <img id="birthdayImage" alt="Birthday memory" />
        <button id="birthdayClose" class="primary-btn" type="button">View Photos</button>
      </div>
    </section>

    <section id="lightbox" class="lightbox" hidden>
      <button id="lightboxClose" class="lightbox-close" type="button" aria-label="Close photo">×</button>
      <button id="lightboxPrev" class="lightbox-nav lightbox-prev" type="button" aria-label="Previous photo">
        ‹
      </button>
      <img id="lightboxImage" class="lightbox-image" alt="" />
      <button id="lightboxNext" class="lightbox-nav lightbox-next" type="button" aria-label="Next photo">›</button>
      <p id="lightboxCounter" class="lightbox-counter"></p>
    </section>

    <script src="photos/photos.js"></script>
    <script src="app.js" defer></script>
  </body>
</html>
