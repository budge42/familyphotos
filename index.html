<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Photos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Work+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="top">
        <div>
          <p class="eyebrow">Family Moments</p>
          <h1>Our Photo Gallery</h1>
          <p class="subtitle">A simple place to keep and share memories.</p>
        </div>
        <div class="actions">
          <label class="upload-btn" for="fileInput">Select photos</label>
          <input id="fileInput" type="file" accept="image/*" multiple />
        </div>
      </header>

      <main>
        <section id="gallery" class="gallery" aria-live="polite"></section>
        <section id="emptyState" class="empty-state" hidden>
          <h2>No photos yet</h2>
          <p>
            Add files to <code>photos/</code> and list them in
            <code>photos/photos.js</code>, or use Select photos for a quick
            preview.
          </p>
        </section>
      </main>
    </div>

    <template id="photoCardTemplate">
      <figure class="card">
        <img loading="lazy" />
        <figcaption></figcaption>
      </figure>
    </template>

    <script src="photos/photos.js"></script>
    <script src="app.js" defer></script>
  </body>
</html>
